<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic CGPA Calculator</title>
  <link rel="stylesheet" href="CGPA.css">
</head>

<body>

  <header class="header">
    <div class="logo-container">
      <img src="/GPA/images/cgpa-logo.png" alt="logo" width="50" height="50" class="logo-img"
        onerror="this.style.display='none'">
      <span class="brand-name">CGPA Calc</span>
    </div>
    <a href="/GPA/GPA.html" class="gpa-link">
      <button class="gpa-btn">Go to GPA</button>
    </a>
  </header>

  <main class="container">
    <section class="info-banner">
      <p><strong>Instructions:</strong> Enter your total GPA score and total course units for each semester. Click
        "Calculate CGPA" to view your standing.</p>
    </section>

    <form id="cgpa-form" onsubmit="event.preventDefault();">
      <div id="years-container" class="level">
        <div class="year-card">
          <h4>Year 1</h4>
          <div class="input-group">
            <input type="number" step="0.01" min="0" max="5" class="semester-gpa-1" placeholder="1st Sem GPA" required>
            <input type="number" step="0.01" min="0" max="5" class="semester-gpa-2" placeholder="2nd Sem GPA" required>
            <input type="number" min="0" class="semester-unit-1" placeholder="1st Sem Units" required>
            <input type="number" min="0" class="semester-unit-2" placeholder="2nd Sem Units" required>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" id="add-year-btn" class="btn btn-secondary">+ Add New Year</button>
        <button type="button" id="calc-btn" class="btn btn-primary">Calculate CGPA</button>
      </div>
    </form>

    <section class="result-section">
      <div class="result-view">
        <p class="label">CGPA STATUS</p>
        <p id="Result">0.00</p>
        <span class="result-text">Cumulative Score</span>
      </div>

      <div class="result-view">
        <p class="label">CLASSIFICATION</p>
        <p id="Rating">No Data</p>
        <span class="result-text">Performance Rating</span>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 || CGPA CALC</p>
    <p>By: <span class="author">FABIAN CODES HQ</span></p>
  </footer>

  <script src="CGPA.js"></script>
</body>

</html>
